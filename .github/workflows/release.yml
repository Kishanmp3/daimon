name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build web UI ─────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build web UI
        run: npm run build
        working-directory: web

      # ── Build Go binaries ────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Build cross-platform binaries
        run: |
          mkdir -p dist
          ldflags="-s -w -X main.version=${{ github.ref_name }}"

          GOOS=windows GOARCH=amd64 \
            go build -tags prod -ldflags="$ldflags" \
            -o dist/daimon.exe ./cmd/daimon

          GOOS=darwin GOARCH=amd64 \
            go build -tags prod -ldflags="$ldflags" \
            -o dist/daimon-mac-amd64 ./cmd/daimon

          GOOS=darwin GOARCH=arm64 \
            go build -tags prod -ldflags="$ldflags" \
            -o dist/daimon-mac-arm64 ./cmd/daimon

          GOOS=linux GOARCH=amd64 \
            go build -tags prod -ldflags="$ldflags" \
            -o dist/daimon-linux-amd64 ./cmd/daimon

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      # ── Create GitHub Release ────────────────────────────────────
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "daimon ${{ github.ref_name }}"
          body: |
            ## Install

            **Mac / Linux**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/Kishanmp3/daimon/main/install.sh | sh
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://raw.githubusercontent.com/Kishanmp3/daimon/main/install.ps1 | iex
            ```

            ---

            | Platform | Binary |
            |---|---|
            | Windows x64 | `daimon.exe` |
            | macOS Intel | `daimon-mac-amd64` |
            | macOS Apple Silicon | `daimon-mac-arm64` |
            | Linux x64 | `daimon-linux-amd64` |
          files: |
            dist/daimon.exe
            dist/daimon-mac-amd64
            dist/daimon-mac-arm64
            dist/daimon-linux-amd64
            dist/checksums.txt
